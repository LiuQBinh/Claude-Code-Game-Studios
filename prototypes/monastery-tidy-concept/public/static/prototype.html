<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Monastery Tidy — Concept Prototype (HTML)</title>
<style>
/* PROTOTYPE - NOT FOR PRODUCTION
   Question: Does drag-drop tidy + purity meter feel like relaxing flow?
   Date: 2026-07-18 */
:root {
  --terracotta: #C1440E;
  --saffron: #E8A827;
  --cream: #F0E6D3;
  --forest: #3D6B4F;
  --brown: #4A3728;
  --gold: #FFD700;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: linear-gradient(180deg, #e8dcc8 0%, var(--cream) 55%, #d9cbb3 100%);
  font-family: "Segoe UI", system-ui, sans-serif;
  color: var(--brown);
  overflow: hidden;
  user-select: none;
}
#hud {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  width: min(420px, 90vw); z-index: 20; text-align: center;
}
#meter-track {
  height: 22px; background: rgba(74,55,40,.85); border-radius: 4px;
  overflow: hidden; border: 2px solid var(--brown);
}
#meter-fill {
  height: 100%; width: 0%; background: var(--gold);
  transition: width .2s ease;
}
#meter-label { margin-top: 8px; font-size: 14px; letter-spacing: .04em; }
#hint {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  font-size: 13px; opacity: .75; z-index: 20;
}
#stage {
  position: absolute; inset: 0;
  background:
    linear-gradient(90deg, transparent 49.5%, rgba(74,55,40,.08) 50%, transparent 50.5%),
    linear-gradient(0deg, var(--terracotta) 0%, var(--terracotta) 18%, transparent 18%);
}
.shelf {
  position: absolute; left: 8%; right: 8%; bottom: 22%;
  height: 14px; background: var(--brown); border-radius: 2px;
  opacity: .55;
}
.home, .prop {
  position: absolute; width: 64px; height: 64px; border-radius: 6px;
  display: grid; place-items: center; font-size: 11px; font-weight: 600;
}
.home {
  border: 2px dashed rgba(74,55,40,.45);
  background: rgba(240,230,211,.35);
  color: rgba(74,55,40,.5);
  transition: box-shadow .15s, border-color .15s;
}
.home.hot {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(255,215,0,.35);
}
.prop {
  cursor: grab; border: 2px solid var(--brown);
  box-shadow: 2px 3px 0 rgba(74,55,40,.25);
  z-index: 5;
  touch-action: none;
}
.prop.dragging { cursor: grabbing; z-index: 10; transform: scale(1.08); box-shadow: 4px 6px 0 rgba(74,55,40,.3); }
.prop.home { outline: 2px solid rgba(255,215,0,.5); }
#reveal {
  position: fixed; inset: 0; display: grid; place-items: center;
  pointer-events: none; opacity: 0; transition: opacity 1.6s ease;
  background: radial-gradient(circle at 50% 45%, rgba(255,215,0,.18), transparent 55%);
  z-index: 15;
}
#reveal.show { opacity: 1; }
.book {
  width: 90px; height: 130px; background: var(--gold);
  border: 3px solid var(--brown); border-radius: 4px;
  display: grid; place-items: center; text-align: center;
  font-weight: 700; font-size: 13px; line-height: 1.3;
  box-shadow: 0 12px 40px rgba(74,55,40,.25);
}
#note {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  font-size: 12px; opacity: .6; z-index: 20; max-width: 90vw; text-align: center;
}
</style>
</head>
<body>
<!-- PROTOTYPE - NOT FOR PRODUCTION
     Question: Does drag-drop tidy + purity meter feel like relaxing flow?
     Date: 2026-07-18 -->

<div id="hud">
  <div id="meter-track"><div id="meter-fill"></div></div>
  <div id="meter-label">Thanh tịnh — 0 / 5</div>
</div>
<div id="note">HTML throwaway · same hypothesis as UE prototype · colored blocks = playful clutter</div>

<div id="stage">
  <div class="shelf"></div>
</div>

<div id="reveal"><div class="book">TAM TẠNG<br/>✦</div></div>
<div id="hint">Drag each block onto its matching dashed home on the shelf</div>

<script>
/* PROTOTYPE - NOT FOR PRODUCTION
   Question: Does drag-drop tidy + purity meter feel like relaxing flow?
   Date: 2026-07-18 */

const COLORS = ["#E8A827", "#C1440E", "#3D6B4F", "#F0E6D3", "#4A3728"];
const LABELS = ["Áo", "Chuông", "Cuộn", "Bát", "Đèn"];
const N = 5;

const stage = document.getElementById("stage");
const fill = document.getElementById("meter-fill");
const label = document.getElementById("meter-label");
const reveal = document.getElementById("reveal");

const homes = [];
const props = [];
let revealed = false;

function layoutHomes() {
  const W = stage.clientWidth;
  const H = stage.clientHeight;
  const y = H * 0.72;
  const span = W * 0.7;
  const startX = (W - span) / 2;
  for (let i = 0; i < N; i++) {
    const el = document.createElement("div");
    el.className = "home";
    el.textContent = LABELS[i];
    el.dataset.id = i;
    const x = startX + (span / (N - 1)) * i;
    el.style.left = (x - 32) + "px";
    el.style.top = (y - 32) + "px";
    stage.appendChild(el);
    homes.push({ el, id: i, x, y });
  }
}

function layoutProps() {
  const W = stage.clientWidth;
  const H = stage.clientHeight;
  const messy = [
    [0.22, 0.42], [0.55, 0.38], [0.38, 0.55], [0.72, 0.48], [0.30, 0.62]
  ];
  for (let i = 0; i < N; i++) {
    const el = document.createElement("div");
    el.className = "prop";
    el.textContent = LABELS[i];
    el.dataset.id = i;
    el.style.background = COLORS[i];
    el.style.color = i === 3 ? "#4A3728" : "#F0E6D3";
    const x = messy[i][0] * W;
    const y = messy[i][1] * H;
    el.style.left = (x - 32) + "px";
    el.style.top = (y - 32) + "px";
    stage.appendChild(el);
    props.push({ el, id: i, home: false });
    bindDrag(el, i);
  }
}

function centerOf(el) {
  const r = el.getBoundingClientRect();
  const sr = stage.getBoundingClientRect();
  return { x: r.left - sr.left + r.width / 2, y: r.top - sr.top + r.height / 2 };
}

function updateMeter() {
  const homeCount = props.filter(p => p.home).length;
  const pct = (homeCount / N) * 100;
  fill.style.width = pct + "%";
  label.textContent = `Thanh tịnh — ${homeCount} / ${N}`;
  if (homeCount === N && !revealed) {
    revealed = true;
    reveal.classList.add("show");
  }
}

function nearestHome(propId, cx, cy) {
  const h = homes.find(h => h.id === propId);
  if (!h) return null;
  const dx = cx - h.x, dy = cy - h.y;
  const dist = Math.hypot(dx, dy);
  return dist < 70 ? h : null;
}

function bindDrag(el, id) {
  let dragging = false;
  let ox = 0, oy = 0;

  const onDown = (clientX, clientY) => {
    dragging = true;
    el.classList.add("dragging");
    const r = el.getBoundingClientRect();
    const sr = stage.getBoundingClientRect();
    ox = clientX - r.left;
    oy = clientY - r.top;
    const p = props[id];
    if (p.home) {
      p.home = false;
      el.classList.remove("home");
      updateMeter();
    }
  };

  const onMove = (clientX, clientY) => {
    if (!dragging) return;
    const sr = stage.getBoundingClientRect();
    let left = clientX - sr.left - ox;
    let top = clientY - sr.top - oy;
    left = Math.max(0, Math.min(sr.width - 64, left));
    top = Math.max(0, Math.min(sr.height - 64, top));
    el.style.left = left + "px";
    el.style.top = top + "px";

    const c = centerOf(el);
    homes.forEach(h => h.el.classList.toggle("hot", h.id === id && Math.hypot(c.x - h.x, c.y - h.y) < 70));
  };

  const onUp = () => {
    if (!dragging) return;
    dragging = false;
    el.classList.remove("dragging");
    homes.forEach(h => h.el.classList.remove("hot"));
    const c = centerOf(el);
    const h = nearestHome(id, c.x, c.y);
    if (h) {
      el.style.left = (h.x - 32) + "px";
      el.style.top = (h.y - 32) + "px";
      props[id].home = true;
      el.classList.add("home");
      updateMeter();
    }
  };

  el.addEventListener("pointerdown", e => {
    el.setPointerCapture(e.pointerId);
    onDown(e.clientX, e.clientY);
  });
  el.addEventListener("pointermove", e => onMove(e.clientX, e.clientY));
  el.addEventListener("pointerup", onUp);
  el.addEventListener("pointercancel", onUp);
}

layoutHomes();
layoutProps();
updateMeter();
</script>
</body>
</html>
